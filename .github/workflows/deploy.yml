name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Inject Airtable secrets
        run: |
          sed -i "s/YOUR_BASE_ID/${{ secrets.AIRTABLE_BASE }}/g" src/pages/timeline.html src/pages/diagnostics-test.html
          sed -i "s/YOUR_PERSONAL_ACCESS_TOKEN/${{ secrets.AIRTABLE_TOKEN }}/g" src/pages/timeline.html src/pages/diagnostics-test.html
          sed -i "s/YOUR_TABLE_NAME/${{ secrets.AIRTABLE_TABLE }}/g" src/pages/diagnostics-test.html

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - uses: actions/deploy-pages@v4
        id: deployment
